<html>
<head>
    <title>javascript2.0 test （xd）</title>
<style>

body{
display: flex;
justify-content: center;
box-sizing: border-box;
gap: 30px;
margin: 0;
}
body{background: linear-gradient(130deg, hwb(66 59% 0%) 0%, #46b4fd 100%);
background-attachment: fixed;}

p{color: white;}

.setting{background-color: rgba(47, 48, 48, 0.9);
  position: fixed;
  left: 0%;
  top : 0%;
width : 80px;
padding: 20px ;
height: 100vh;
margin: 0 auto;
}

.text{background-color: rgba(47, 48, 48, 0.9); 
   overflow-y: auto; 
width : 850px;
padding: 50px ;
min-height: 100vh;
margin-left: 180px;
}
.text img{
  transition: transform 0.3s ease;
  margin: 6px;
}

.text img:hover{
  transform: scale(1.05);
}



.setting img{
  width: 80px;
  height: 80px;
  border-radius: 50%;
}
a{color: white;}
.setting{
  box-shadow: 4px 0 15px rgba(0,0,0,0.3);
}
h2{color: white;
}


</style>
</head>
<body>


<div class="setting">
<img src="114514/QvajnMXdraB1JPLy.jpg"/>
<p style="text-align: center;">Michael</p>
</div>

<div id="welcome" class="text content-route">
<h2>Well,here is the second test of javascript</h2>
<h2>plz don't care about the content</h2>
<nav>
<p><a href="index.html" target="_blank">HOMEPAGE</a></p>
</nav>

<button onclick="showRoute('route1')">Start test</button>

</div>
<div id ="route1" class="text content-route" style="display:none;">
<h2>Here is the first question</h2>
<p>what is 6 + 7?</p>
<button onclick="showRoute('1stT')">=13</button>
<button onclick="showRoute('1stF')">=12</button>
<button style="display: block;margin-top: 20px;" onclick="showRoute('welcome')">back to last page</button>

</div>

<div id ="1stT" class="text content-route" style="display:none;">
<h2>Correct Answer!</h2>
<p>OMG NO WAY! YOU ARE A GENIUS! </p>
<button onclick="showRoute('route1')">TRY AGAIN</button>
<button onclick="showRoute('route2')">Continue test</button>
</div>

<div id ="1stF" class="text content-route" style="display:none;">
<h2>Incorrect Answer!</h2>
<p>ARE YOU KIDDING ME? ARE YOU DUMB?</p>
<button onclick="showRoute('route1')">TRY AGAIN</button>
</div>



<script>

function showRoute(routeId) {

  const allRoutes = document.querySelectorAll('.content-route');

  allRoutes.forEach(route => {
    route.style.display = 'none';
  });

  const targetRoute = document.getElementById(routeId);

  if (targetRoute) {
    targetRoute.style.display = 'block';
  }
}

</script>
</body>
</html>
