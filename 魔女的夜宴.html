<!DOCTYPE html>
<html>
<head>
<title>サノバウィッチ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body{ display: flex; justify-content: center; box-sizing: border-box; margin: 0; }
    body{ background: linear-gradient(130deg, hwb(66 59% 0%) 0%, #46b4fd 100%); background-attachment: fixed; }

    .setting{ background-color: rgba(47, 48, 48, 0.9); position: fixed; left: 0%; top : 0%; width : 100vw; height: 80px;
              display: flex; align-items: center; justify-content: space-between; z-index: 999; }
    .setting img{ width: 50px; height: 50px; border-radius: 50%; margin: 15px; }
    .setting p{ color: white; margin: 0%; flex-grow: 1;}
    .setting button{ background-color: transparent; border: 1px solid white; color: white; padding: 8px 16px; margin: 15px; cursor: pointer; }
    
    h1, p, a { color: white; }

    /* 容器：避开顶部 80px */
    .非setting部分{ margin-top: 120px; display: flex; justify-content: center; width: 100%; }

    /* 路由通用样式：默认全部隐藏 */
    .content-route { display: none; }

    /* 屏幕和文本框样式 */
    .屏幕{ width: 1200px; height: 800px; background: rgba(47, 48, 48, 0.8); border-radius: 8px; display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
    .文本框{ background-color: rgba(47, 48, 48, 0.8); width: 400px; height: 800px; border-radius: 8px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column;margin-left: 15px; }
    
    .story-display { color: white; font-size: 18px; line-height: 1.6; flex-grow: 1; overflow-y: auto; }
    .image-container img { max-width: 100%; height: auto; border-radius: 8px; animation: fadeIn 0.8s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* 给 Explanation 界面单独加个样式，让它看起来正常点 */
    #Explanation { background: rgba(47, 48, 48, 0.9); padding: 50px; border-radius: 8px; width: 600px; }
    
    .按钮组 {
    display: flex;
    justify-content: center;
    gap: 10px;
    width: 100%;
    /* 关键：把上面的空间占满，从而让自己固定在文本框最底部 */
    margin-top: auto; 
    padding-top: 20px;
    padding-bottom: 5px;
} 
   .按钮组 button {
    flex: 1;                 /* 两个按钮平分宽度 */
    max-width: 100px;        /* 限制最大宽度，防止太长 */
    padding: 8px;
    cursor: pointer;
    background: transparent;
    color: white;
    border: 1px solid white;
    border-radius: 4px;
    
    }
   button:hover {
    background: rgba(70, 180, 253, 0.5); /* 悬停时变蓝色 */
}/* 响应式适配：针对手机端 */
@media (max-width: 768px) {
    /* 1. 让大容器变为上下排列 */
    .非setting部分 {
        flex-direction: column;
        align-items: center;
        margin-top: 100px; /* 缩小顶部间距 */
        gap: 20px;
    }

    /* 2. 路由容器在手机端也改为纵向 */
    #route1 {
        flex-direction: column !important;
        align-items: center;
        width: 100%;
    }

    /* 3. 屏幕（图片区）适配手机宽度 */
    .屏幕 {
        width: 90vw;    /* 占屏幕宽度的 95% */
        height: auto;   /* 高度根据内容自动 */
        min-height: 300px;
        padding: 10px;
    }

    /* 4. 文本框适配手机宽度 */
    .文本框 {
        width: 90vw;
        height: 400px;  /* 手机上文本框高度固定，方便阅读 */
        margin-left: 0; /* 取消左边距 */
        margin-bottom: 50px; /* 底部留白 */
        margin-top: 10px; /* 顶部留白 */
    }

    /* 5. 调整顶部导航栏高度 */
    .setting {
        height: 60px;
    }
    
    /* 6. 调整 Explanation 页面宽度 */
    #Explanation {
        width: 90vw;
        padding: 10px;
    }
}
.options-container {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 30px;    /* 与上方文字的间距 */
    margin-bottom: 20px; /* 与下方 Back/Pause 按钮的间距 */
}
}
.option-btn {
    background: rgba(70, 180, 253, 0.2);
    border: 1px solid #46b4fd;
    color: white;
    padding: 10px;
    border-radius: 5px;
    cursor: pointer;
    text-align: center;
    transition: 0.3s;
    animation: fadeIn 0.5s; /* 出现时有个小动画 */
}
.option-btn:hover {
    background: rgba(70, 180, 253, 0.6);
}
</style>
</head>
<body>

<div class="setting">
    <img src="114514/QvajnMXdraB1JPLy.jpg"/>
    <p style="margin-left: 10px;">Michael</p>
    <button id="Homepage" onclick="window.location.href='index.html'">Homepage</button>
</div>

<div class="非setting部分">
    <div id="Explanation" class="content-route" style="display: block;">
        <h1>EXPLANATION</h1>
        <p>There is a light novel about...</p>
        <button onclick="showRoute('route1')">Start reading</button>
    </div> <div id="route1" class="content-route" 
         data-story="[IMG:自室_自室A.png](Beep-beep-beep!)   (alarm) 
         <br>Ugh... what s that noise? Don t get between me and Ms. Blanket...
<br>(Zzz... Zzz...)

<br>(Beep-beep-beep!)

<br>Ugh...! 

">
        
        <div class="屏幕">
            <h1>1-1</h1>
            <div class="image-container"></div>
        </div>

        <div class="文本框">
            <p class="story-display"></p> 
            <div id="options-route1" class="options-container"></div>

        <div class="按钮组">
            <button onclick="showRoute('Explanation')">back</button>
            <button onclick="togglePause()">pause</button>
        </div>
        </div>
    </div> </div>

<script>
    let isPaused = false; // 必须定义这个全局变量

function togglePause() {
    isPaused = !isPaused;
    // 更新按钮文字
    if (window.event) {
        window.event.target.innerText = isPaused ? "Resume" : "Pause";
    }
}
function typeWriter(element, text, speed = 50) {
    let i = 0;
    isPaused = false;
    element.innerHTML = "";
    const currentRoute = element.closest('.content-route');
    const imgBox = currentRoute.querySelector('.image-container');
    const optBox = currentRoute.querySelector('.options-container'); // 找到选项盒
    
    if (imgBox) imgBox.innerHTML = "";
    if (optBox) optBox.innerHTML = ""; // 切换路由时清空选项

    function type() {
        if (isPaused) { setTimeout(type, 100); return; }

        if (i < text.length) {
            // ... 你原有的打字逻辑 (IMG处理、BR处理等) ...
            if (text.substring(i, i + 4) === "<br>") {
                element.innerHTML += "<br>"; i += 4;
            } else if (text.substring(i, i + 5) === "[IMG:") {
                let endBracket = text.indexOf("]", i);
                let fileName = text.substring(i + 5, endBracket);
                if (imgBox) imgBox.innerHTML = `<img src="114514/${fileName}">`;
                i = endBracket + 1;
            } else {
                element.innerHTML += text.charAt(i); i++;
            }
            element.scrollTop = element.scrollHeight;
            setTimeout(type, speed);
        } else {
            // --- 核心修改：字打完了，显示按钮 ---
            if (currentRoute.id === 'route1') {
                optBox.innerHTML = `
                    <button class="option-btn" onclick="showRoute('route_school')">I have to get up</button>
                    <button class="option-btn" onclick="showRoute('route_sleep')">Just five more minutes</button>
                `;
            }
        }
    }
    type();
}

function showRoute(routeId) {
    // 隐藏所有路由
    const allRoutes = document.querySelectorAll('.content-route');
    allRoutes.forEach(route => {
        route.style.display = 'none';
    });

    // 显示指定的路由
    const targetRoute = document.getElementById(routeId);
    if (targetRoute) {
        // 如果是剧情页，使用 flex 实现并列；如果是说明页，使用 block 居中
        targetRoute.style.display = routeId.includes('route') ? 'flex' : 'block';
        
        // 只有在 route1 时才触发打字机
        const storyText = targetRoute.getAttribute('data-story'); 
        const displayBox = targetRoute.querySelector('.story-display');
        if (storyText && displayBox) {
            typeWriter(displayBox, storyText, 30);
        }
    }
}
</script>
</body>
</html>
